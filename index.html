<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 紅海開路大挑戰：純 CSS 終極版 🌊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1d21;
            color: #ecf0f1;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 👉 修正：手機滑動卡住的問題 */
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }
        h1 {
            color: #f1c40f;
            font-size: 2.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            font-weight: 900;
        }
        .subtitle {
            color: #bdc3c7;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 95%;
            max-width: 1200px;
            height: auto;
        }

        /* 俯瞰紅海展示區 (1:1 比例) */
        .sea-container {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
            border: 5px solid #2c3e50;
        }

        /* 👉👉👉👉 視覺完整度修正：海底底圖，放上已經分開的精美 AI 圖片 👈👈👈👈 */
        .seabed-background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('./images/sea_parted.jpg'); /* 👉 請確認 images 資料夾內有此圖 */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        
        /* 👉👉👉👉 👉 新增：金銀財寶標籤 (使用 CSS 繪製簡單圖示) 👈👈👈👈 👈 */
        .seabed-treasure {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 50px;
            border: 2px solid #f1c40f;
        }
        .seabed-treasure-icon {
            display: flex;
            gap: 5px;
        }
        /* CSS 繪製簡單的圓形，代表金幣/銀幣 */
        .treasure-coin { width: 15px; height: 15px; border-radius: 50%; }
        .coin-gold { background-color: #f1c40f; box-shadow: 0 0 5px #f1c40f; }
        .coin-silver { background-color: #bdc3c7; box-shadow: 0 0 5px #bdc3c7; }
        .seabed-treasure-text {
            color: #f1c40f;
            font-size: 1em;
            font-weight: 700;
        }
        /* 👉👉👉👉 👉👈👈👈👈👈 👉👈👈👈👈👈 */

        /* 👉👉👉👉👉👉👉👉👉 終極修正：徹底純 CSS 動態海浪 👈👈👈👈👈👈👈👈👈 */
        /* 海浪遮罩：設定開路動畫 */
        .sea-wave {
            position: absolute;
            top: 0;
            width: 50%; height: 100%;
            /* 👉👉👉 👉 這裡移除任何圖片 dependency！完全純 CSS 繪製！👈👈👈 👈 */
            /* 使用漸層和多層背景模擬波紋 */
            background: linear-gradient(90deg, #0984e3, #74b9ff, #0984e3);
            background-size: 400% 100%;
            z-index: 3; /* 確保在海底底圖和金銀財寶上面 */
            /* 👉👉 👉👉 這是開海動畫的關鍵：過渡效果 transition 👈👈👈 👈 */
            transition: transform 1.5s ease-in-out; /* 由 JavaScript 觸發位移 */
            overflow: hidden; /* 掃光容器 */
            border-right: 3px solid rgba(255,255,255,0.7); /* 海浪邊緣反光 */
            box-shadow: 5px 0 15px rgba(0,0,0,0.6);
            
            /* 👉 新增：波浪動態背景動畫 (純 CSS 實現) */
            animation: waves-bg 5s linear infinite; 
        }
        
        /* 波浪動態漸層動畫定義 */
        @keyframes waves-bg {
            0% { background-position: 0% 0%; }
            100% { background-position: 400% 0%; }
        }

        /* 左邊的海水 */
        .sea-left {
            left: 0;
            /* 海浪晃動動畫 (左) */
            animation: waves-bg 5s linear infinite, wave-sway-left 4s ease-in-out infinite;
        }
        /* 左邊海浪的掃光效果 */
        .sea-left::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: light-sweep 3s linear infinite;
        }

        /* 右邊的海水：使用程式鏡射 */
        .sea-right {
            right: 0;
            transform: scaleX(-1); /* 👉 專業鏡射，不需第二張圖 */
            /* 鏡射後的晃動動畫需要反向 */
            animation: waves-bg 5s linear infinite, wave-sway-right 4s ease-in-out infinite;
        }
        /* 右邊海浪掃光 (修正方向) */
        .sea-right::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to top right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(-45deg);
            animation: light-sweep-reverse 3s linear infinite;
        }
        
        /* 👈👈👈👈👈👈👈👈👈 終極修正 👈👈👈👈👈👈👈👈👈 */

        /* 海浪晃動動畫定義 (左) */
        @keyframes wave-sway-left {
            0%, 100% { transform: translateX(0) scaleY(1); }
            50% { transform: translateX(5px) scaleY(1.02); }
        }
        /* 海浪晃動動畫定義 (右：需考慮鏡射) */
        @keyframes wave-sway-right {
            0%, 100% { transform: scaleX(-1) translateX(0) scaleY(1); }
            50% { transform: scaleX(-1) translateX(-5px) scaleY(1.02); }
        }

        /* 掃光動畫定義 (正向) */
        @keyframes light-sweep {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }
        /* 掃光動畫定義 (反向，用於鏡射後的右側) */
        @keyframes light-sweep-reverse {
            0% { transform: translate(-100%, 100%) rotate(-45deg); }
            100% { transform: translate(100%, -100%) rotate(-45deg); }
        }

        /* 👉👉👉👉👉👉👉👉👉👉👉 您的代碼漏掉的最關鍵修正！！！！！ 👈👈👈👈👈👈👈👈👈👈👈👈 */
        /* 當點擊答對時， JavaScript 會在 <body> 加入 .quiz-active 類別 */
        /* 這裡定義當類別加入時，海浪該「如何動」：就是利用 transform 位移出去！ */
        #game-body.quiz-active #s-left {
            transform: translateX(-100%) !important; /* 強制海浪退去到左邊外面 */
        }
