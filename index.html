<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 紅海開路大挑戰：過紅海神蹟 🌊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1d21;
            color: #ecf0f1;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 👉 修正：手機滑動卡住的問題 */
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }
        h1 {
            color: #f1c40f;
            font-size: 2.8em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            font-weight: 900;
        }
        .subtitle {
            color: #bdc3c7;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 95%;
            max-width: 1200px;
            height: auto;
        }

        /* 俯瞰紅海展示區 (1:1 比例) */
        .sea-container {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
            border: 5px solid #2c3e50;
        }

        /* 底層： seabed (您原本註解的那段底圖我保留了結構) */
        .sea-background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* background-image: url('./images/sea_parted.jpg'); 👉 保留註解結構 */
            background-size: cover;
            background-position: center;
            background-color: #1a1d21; /* 目前預設純色底 */
            z-index: 1;
        }

        /* 海底金銀財寶與文字標籤 */
        .seabed-treasure {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 50px;
            border: 2px solid #f1c40f;
        }
        .seabed-treasure-icon {
            display: flex;
            gap: 5px;
        }
        .treasure-coin { width: 15px; height: 15px; border-radius: 50%; }
        .coin-gold { background-color: #f1c40f; box-shadow: 0 0 5px #f1c40f; }
        .coin-silver { background-color: #bdc3c7; box-shadow: 0 0 5px #bdc3c7; }
        .seabed-treasure-text {
            color: #f1c40f;
            font-size: 1em;
            font-weight: 700;
        }

        /* 👉👉👉👉 👉 純 CSS 繪製的神祕動態紅海 (去背、晃動、掃光) 👈👈👈👈 👈 */
        /* 海浪遮罩：設定基礎樣式 */
        .sea-wave {
            position: absolute;
            top: 0;
            width: 50%; height: 100%;
            /* 使用漸層和多層背景模擬波紋 */
            background: linear-gradient(90deg, #0984e3, #74b9ff, #0984e3);
            background-size: 400% 100%;
            z-index: 3; /* 確保在海底上面 */
            /* 退去位移動畫 */
            transition: transform 1.5s ease-in-out; /* 由 JavaScript 觸發 */
            overflow: hidden; /* 掃光容器 */
            border-right: 3px solid rgba(255,255,255,0.7); /* 海浪邊緣反光 */
            box-shadow: 5px 0 15px rgba(0,0,0,0.6);
            
            /* 波浪動態漸層背景動畫 */
            animation: waves-bg 5s linear infinite; 
        }
        
        /* 左邊的海水 */
        .sea-left {
            left: 0;
            animation: waves-bg 5s linear infinite, wave-sway-left 4s ease-in-out infinite;
        }
        /* 左邊海浪的掃光效果 */
        .sea-left::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: light-sweep 3s linear infinite;
        }

        /* 右邊的海水：使用程式鏡射 */
        .sea-right {
            right: 0;
            transform: scaleX(-1); /* 鏡射 */
            /* 鏡射後的晃動動畫需要反向 */
            animation: waves-bg 5s linear infinite, wave-sway-right 4s ease-in-out infinite;
        }
        /* 右邊海浪掃光 (修正方向) */
        .sea-right::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to top right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(-45deg);
            animation: light-sweep-reverse 3s linear infinite;
        }
        
        /* 波浪動態漸層動畫定義 */
        @keyframes waves-bg {
            0% { background-position: 0% 0%; }
            100% { background-position: 400% 0%; }
        }

        /* 海浪晃動動畫定義 (左) */
        @keyframes wave-sway-left {
            0%, 100% { transform: translateX(0) scaleY(1); }
            50% { transform: translateX(5px) scaleY(1.02); }
        }
        /* 海浪晃動動畫定義 (右：需考慮鏡射) */
        @keyframes wave-sway-right {
            0%, 100% { transform: scaleX(-1) translateX(0) scaleY(1); }
            50% { transform: scaleX(-1) translateX(-5px) scaleY(1.02); }
        }

        /* 掃光動畫定義 (正向) */
        @keyframes light-sweep {
            0% { transform: translate(-100%, -100%) rotate(45deg); }
            100% { transform: translate(100%, 100%) rotate(45deg); }
        }
        /* 掃光動畫定義 (反向，用於鏡射後的右側) */
        @keyframes light-sweep-reverse {
            0% { transform: translate(-100%, 100%) rotate(-45deg); }
            100% { transform: translate(100%, -100%) rotate(-45deg); }
        }

        /* 👉👉👉 👉👉👉👉👉👉👉 👉👉👉 👉👉👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 */
        /* 當點擊答對時， JavaScript 會在 <body> 加入 .quiz-active 類別 */
        /* 當類別加入時，定義海浪該「如何動」：就是分別對稱退去！ */
        #game-body.quiz-active #s-left {
            transform: translateX(-100%) !important; /* 強制海浪退去到左邊外面 */
            animation-play-state: paused !important; /* 👉 終極修正：暫停晃動動畫，以免和過渡位移互斥！ */
        }
        #game-body.quiz-active #s-right {
            transform: scaleX(-1) translateX(100%) !important; /* 鏡射後退到右邊外面 */
            animation-play-state: paused !important; /* 👉 終極修正：暫停晃動動畫，以免和過渡位移互斥！ */
        }
        /* 👈👈👈👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 👈 */

        /* --- 以下問答區樣式與過關金句樣式 (修正定位以適應滑動) --- */
        .quiz-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .turn-indicator {
            font-size: 1.5em;
            font-weight: 900;
            color: #00d2d3;
            margin-bottom: 15px;
            background: rgba(0, 210, 211, 0.1);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .timer { font-size: 4em; font-weight: 900; color: #ff6b6b; margin-bottom: 20px; }
        .dynamic-text { height: 150px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 20px; }
        .question { font-size: 1.6em; line-height: 1.4; }
        .answer { font-size: 1.8em; color: #1dd1a1; font-weight: bold; display: none; margin-top: 15px;}
        
        button { border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 50px; cursor: pointer; margin: 8px; transition: 0.3s; font-weight: bold; }
        button:hover { transform: scale(1.05); }
        .btn-start { background: #feca57; color: #222; }
        .btn-show { background: #48dbfb; color: #222; display: none; }
        .btn-correct { background: #1dd1a1; color: #222; display: none; }
        .btn-wrong { background: #576574; color: white; display: none; }

        #victory-message {
            display: none;
            position: fixed; /* 讓金句浮在最上層 */
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #f1c40f;
            z-index: 100;
            width: 80%;
            box-sizing: border-box;
        }
        #victory-message h2 { color: #1dd1a1; font-size: 3em; margin: 0 0 15px 0;}
        #victory-message h3 { color: #f1c40f; font-size: 2.2em; line-height: 1.6; font-weight: 700; margin: 0;}
        #victory-message .reference { color: #bdc3c7; font-size: 1.2em; margin-top: 10px; display: block;}

        /* 響應式修正：在小螢幕上讓內容上下排列並可滑動 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                gap: 20px;
            }
            .sea-container {
                width: 95%;
                height: auto;
                aspect-ratio: 1; /* 保持正方形 */
                max-width: 500px;
            }
            .quiz-container {
                width: 95%;
                margin-top: 20px;
            }
            h1 { font-size: 2.2em; }
            .subtitle { font-size: 1em; }
            .timer { font-size: 3em; }
            .question { font-size: 1.3em; }
            .answer { font-size: 1.5em; }
            #victory-message h2 { font-size: 2em; }
            #victory-message h3 { font-size: 1.6em; }
        }
    </style>
</head>
<body id="game-body">

    <h1>🌊 神蹟之路：純 CSS 終極修正版 🌊</h1>
    <div class="subtitle">兩組輪流答題，全班共同答對8題，紅海將從兩旁晃動退去！</div>

    <div class="main-container">
        <div class="sea-container">
            <div class="sea-background"></div>
            
            <div class="seabed-treasure">
                <div class="seabed-treasure-icon">
                    <div class="treasure-coin coin-gold"></div>
                    <div class="treasure-coin coin-silver"></div>
                </div>
                <div class="seabed-treasure-text">埃及人的財物 (金器、銀器)</div>
            </div>
            
            <div class="sea-wave sea-left" id="s-left"></div>
            <div class="sea-wave sea-right" id="s-right"></div>
        </div>

        <div class="quiz-container">
            <div class="turn-indicator" id="turn-text">現在輪到：第一組</div>
            <div class="timer" id="timer-text">10</div>
            
            <div class="dynamic-text">
                <div class="question" id="q-text">準備好目睹神蹟了嗎？點擊開始！</div>
                <div class="answer" id="a-text">答案顯示區</div>
            </div>
            
            <button class="btn-start" id="start-btn" onclick="startRound()">開始計時 (10秒)</button>
            <button class="btn-show" id="show-ans-btn" onclick="showAnswer()">時間暫停 / 顯示答案</button>
            <br>
            <button class="btn-correct" id="correct-btn" onclick="markCorrect()">答對了！海水退去</button>
            <button class="btn-wrong" id="wrong-btn" onclick="nextTeam()">不會 / 超時 (換組)</button>
        </div>
    </div>

    <div style="height: 50vh; width: 100%; display: flex; align-items: center; justify-content: center; color: #576574; font-size: 1.2em; margin-top: 50px; border-top: 1px dashed #2c3e50;">
        (此區為測試滑動，可上下滑動網頁。答對題目時，海水會對稱退去！)
    </div>

    <div id="victory-message">
        <h2>🎉 紅海開了！我們得救了！</h2>
        <h3>「耶和華果然為我們行了大事，<br>我們就歡喜。」<br>
            <span class="reference">詩篇 126:3</span>
        </h3>
    </div>

    <script>
        // 題庫 (符合聖經/歷史背景)
        const questions = [
            { q: "以色列人在埃及住了多少年？", a: "430年" },
            { q: "他們離開時，把什麼包在衣服中扛在肩頭上？", a: "沒有酵的生麵 (無酵餅)" },
            { q: "以色列人離開時，向埃及人要了什麼東西？", a: "金器、銀器和衣裳" },
            { q: "白天時，上帝用什麼在前面引導他們的路？", a: "雲柱" },
            { q: "夜間時，上帝用什麼光照他們？", a: "火柱" },
            { q: "上帝為什麼不帶他們走最近的「非利士地」的道路？", a: "怕百姓遇見打仗後悔，就回埃及去" },
            { q: "當法老帶兵追來，以色列人非常害怕時，摩西叫百姓怎麼做？", a: "不要懼怕，只管站住！" },
            { q: "摩西向海伸杖後，發生了什麼事？", a: "紅海分開，以色列人走乾地" },
            { q: "法老的追兵最後的下場是什麼？", a: "海水回流，全軍淹沒在海中" },
            { q: "以色列人到了「瑪拉」，那裡的水為什麼不能喝？", a: "因為水是苦的" },
            { q: "上帝指示摩西把什麼丟進水裡，水就變甜了？", a: "一棵樹" },
            { q: "他們後來到了「以琳」，那裡有什麼？", a: "十二股水泉，七十棵棕樹" },
            { q: "宗教年的8月是猶太曆法的什麼月？", a: "瑪西班月" } // 修正原題庫筆誤
        ];

        let currentQIndex = 0;
        let correctCount = 0;
        const totalToWin = 8; // 兩組共同答對8題即過關
        let currentTeam = 1; 
        let timeLeft = 10;
        let timerInterval;

        // 隨機洗牌題目
        questions.sort(() => Math.random() - 0.5);

        // 初始化準備下一題
        function prepareNext() {
            document.getElementById('turn-text').innerText = currentTeam === 1 ? "現在輪到：第一組" : "現在輪到：第二組";
            document.getElementById('turn-text').style.color = currentTeam === 1 ? "#00d2d3" : "#feca57";
            
            document.getElementById('q-text').innerText = "請點擊「開始計時」看題目";
            document.getElementById('a-text').style.display = 'none';
            document.getElementById('timer-text').innerText = "10";
            document.getElementById('timer-text').style.color = "#ff6b6b";
            
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('show-ans-btn').style.display = 'none';
            document.getElementById('correct-btn').style.display = 'none';
            document.getElementById('wrong-btn').style.display = 'none';
            
            // 重要：在準備下一題時，重置海浪回到原位 (此版本答對一次就全開，prepareNext 用不到這行，但保留代碼邏輯)
            // document.getElementById('game-body').classList.remove('quiz-active');
        }

        // 開始計時
        function startRound() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('show-ans-btn').style.display = 'inline-block';
            document.getElementById('q-text').innerText = questions[currentQIndex].q;
            
            // 👉 👉 👉👉 修正這裡！清空舊計時器排隊陷阱 👈👈👈 👈
            if(timerInterval) clearInterval(timerInterval);

            timeLeft = 10;
            document.getElementById('timer-text').innerText = timeLeft;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                if (timeLeft <= 3) document.getElementById('timer-text').style.color = "#ee5253";
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-text').innerText = "超時！";
                    showAnswer(); 
                }
            }, 1000);
        }

        // 顯示答案
        function showAnswer() {
            clearInterval(timerInterval); 
            document.getElementById('a-text').innerText = "答案：" + questions[currentQIndex].a;
            document.getElementById('a-text').style.display = 'block'; 
            
            document.getElementById('show-ans-btn').style.display = 'none';
            document.getElementById('correct-btn').style.display = 'inline-block';
            document.getElementById('wrong-btn').style.display = 'inline-block';
        }

        // 👉 👉 JS 邏輯修正：這是答對時向 CSS 發出訊號的指令！ 👈 👈
        // 答對了！海水退去
        function markCorrect() {
            correctCount++;
            
            // 1. 我們在 <body> 加入 'quiz-active' 這個類別。
            // 配合 CSS 中補上的 .quiz-active 規則和 paused 動畫指令，紅海就會開始位移退去！
            document.getElementById('game-body').classList.add('quiz-active');
            
            // 2. 為了讓動畫跑完，我們等待 1.5 秒 (CSS transition 時間)，再進行遊戲邏輯更新
            setTimeout(() => {
                advanceGame();
            }, 1500); 
        }

        function nextTeam() {
            advanceGame();
        }

        function advanceGame() {
            currentQIndex++;
            currentTeam = currentTeam === 1 ? 2 : 1;
            
            // 檢查是否過關
            if (correctCount >= totalToWin) {
                setTimeout(() => {
                    // 給一點時間讓動畫跑完
                    document.getElementById('victory-message').style.display = 'block';
                }, 1500); 
            } else if (currentQIndex < questions.length) {
                // 如果您希望答對一題退去一點，答錯換組時回到原位，可以在這裡呼叫 prepareNext()
                // 因為我們設定答對全退去需要 1.5 秒，這裡我們延遲準備下一題
                setTimeout(prepareNext, 1500); 
            } else {
                document.getElementById('q-text').innerText = "題庫已答完！求神繼續帶領！";
                document.getElementById('start-btn').style.display = 'none';
            }
        }

        // 啟動遊戲
        prepareNext();
    </script>
</body>
</html>
